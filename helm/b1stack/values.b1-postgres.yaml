# B1-Postgres environment — CloudNativePG backend on hz.ledoweb.com
# Namespace: b1-postgres
#
# Deploy:
#   helm upgrade --install b1pg helm/b1stack \
#     --kube-context hetzner-ledo --namespace b1-postgres --create-namespace \
#     -f helm/b1stack/values.yaml -f helm/b1stack/values.b1-postgres.yaml \
#     --set cnpg.auth.password=<PG_PW> \
#     --wait --timeout 10m

dbDialect: postgres

global:
  baseDomain: b1-postgres.hz.ledoweb.com
  ingress:
    clusterIssuer: letsencrypt-prod

mysql:
  enabled: false

cnpg:
  enabled: true
  instances: 2
  storage:
    size: 10Gi
    storageClass: hcloud-volumes
  backup:
    enabled: true
    endpointURL: "https://fsn1.your-objectstorage.com"
    destinationPath: "s3://ledo-backups/b1stack/b1-postgres"
    s3CredentialsSecret: aws-s3-credentials
    retentionPolicy: "30d"
    schedule: "0 2 * * *"
  # Sized to match MySQL environment for fair A/B comparison
  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "200"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

api:
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  env:
    ENVIRONMENT: dev
    SERVER_PORT: "8084"
    SOCKET_PORT: "8087"
    SOCKET_URL: "ws://b1pg-api:8087"
    CORS_ORIGIN: "*"
    FILE_STORE: disk
    DELIVERY_PROVIDER: local
    DB_CONNECTION_LIMIT: "15"

b1admin:
  env:
    REACT_APP_MEMBERSHIP_API: "https://api-b1-postgres.hz.ledoweb.com/membership"
    REACT_APP_ATTENDANCE_API: "https://api-b1-postgres.hz.ledoweb.com/attendance"
    REACT_APP_GIVING_API: "https://api-b1-postgres.hz.ledoweb.com/giving"
    REACT_APP_REPORTING_API: "https://api-b1-postgres.hz.ledoweb.com/reporting"
    REACT_APP_MESSAGING_API: "https://api-b1-postgres.hz.ledoweb.com/messaging"
    REACT_APP_MESSAGING_API_SOCKET: "wss://api-b1-postgres.hz.ledoweb.com"
    REACT_APP_CONTENT_API: "https://api-b1-postgres.hz.ledoweb.com/content"
    REACT_APP_DOING_API: "https://api-b1-postgres.hz.ledoweb.com/doing"
    REACT_APP_LESSONS_API: "https://api-b1-postgres.hz.ledoweb.com/lessons"
    REACT_APP_CONTENT_ROOT: "https://b1-postgres.hz.ledoweb.com"
    REACT_APP_B1_ROOT: "https://b1-postgres.hz.ledoweb.com"
    REACT_APP_B1ADMIN_ROOT: "https://admin-b1-postgres.hz.ledoweb.com"

b1app:
  env:
    NEXT_STAGE: dev
    NEXT_PUBLIC_MEMBERSHIP_API: "https://api-b1-postgres.hz.ledoweb.com/membership"
    NEXT_PUBLIC_ATTENDANCE_API: "https://api-b1-postgres.hz.ledoweb.com/attendance"
    NEXT_PUBLIC_GIVING_API: "https://api-b1-postgres.hz.ledoweb.com/giving"
    NEXT_PUBLIC_REPORTING_API: "https://api-b1-postgres.hz.ledoweb.com/reporting"
    NEXT_PUBLIC_MESSAGING_API: "https://api-b1-postgres.hz.ledoweb.com/messaging"
    NEXT_PUBLIC_MESSAGING_API_SOCKET: "wss://api-b1-postgres.hz.ledoweb.com"
    NEXT_PUBLIC_CONTENT_API: "https://api-b1-postgres.hz.ledoweb.com/content"
    NEXT_PUBLIC_DOING_API: "https://api-b1-postgres.hz.ledoweb.com/doing"
    NEXT_PUBLIC_LESSONS_API: "https://api-b1-postgres.hz.ledoweb.com/lessons"
    NEXT_PUBLIC_CONTENT_ROOT: "https://b1-postgres.hz.ledoweb.com"
    NEXT_PUBLIC_B1_ROOT: "https://b1-postgres.hz.ledoweb.com"
    NEXT_PUBLIC_B1ADMIN_ROOT: "https://admin-b1-postgres.hz.ledoweb.com"

lessonsapi:
  enabled: false

askapi:
  enabled: false
