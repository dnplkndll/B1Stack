{{- if .Values.api.enabled }}
# WARNING: In production, use the ExternalSecrets operator or sealed-secrets
# rather than storing plaintext secrets in values files.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-secrets
  labels:
    app: {{ .Release.Name }}-api
type: Opaque
stringData:
  {{- range $k, $v := .Values.api.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
