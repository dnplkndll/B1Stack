{{- if .Values.b1app.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-b1app-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-b1app
data:
  {{- range $k, $v := .Values.b1app.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
