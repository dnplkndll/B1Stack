{{- if .Values.askapi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-askapi-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-askapi
data:
  {{- if .Values.askapi.env }}
  {{- range $k, $v := .Values.askapi.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
