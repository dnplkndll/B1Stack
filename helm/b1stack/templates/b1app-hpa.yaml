{{- if and .Values.b1app.enabled .Values.b1app.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-b1app
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-b1app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-b1app
  minReplicas: {{ .Values.b1app.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.b1app.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.b1app.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.b1app.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.b1app.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.b1app.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
