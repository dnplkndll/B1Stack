{{- if .Values.lessonsapi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-lessonsapi-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-lessonsapi
data:
  {{- if .Values.lessonsapi.env }}
  {{- range $k, $v := .Values.lessonsapi.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
