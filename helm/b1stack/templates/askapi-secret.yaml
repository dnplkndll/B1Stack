{{- if .Values.askapi.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-askapi-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-askapi
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ .Values.askapi.secrets.ENCRYPTION_KEY | default (include "b1stack.autoSecret" (list . (printf "%s-askapi-secrets" .Release.Name) "ENCRYPTION_KEY" 24)) | quote }}
  JWT_SECRET: {{ .Values.askapi.secrets.JWT_SECRET | default (include "b1stack.autoSecret" (list . (printf "%s-askapi-secrets" .Release.Name) "JWT_SECRET" 32)) | quote }}
  CONNECTION_STRING: {{ .Values.askapi.secrets.CONNECTION_STRING | default (include "b1stack.connStr" (list "askapi" . "")) | quote }}
  {{- range $k, $v := .Values.askapi.secrets }}
  {{- if and $v (not (has $k (list "ENCRYPTION_KEY" "JWT_SECRET" "CONNECTION_STRING"))) }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
