# B1Stack Helm umbrella chart values
# Bitnami MySQL sub-chart
mysql:
  enabled: true
  auth:
    rootPassword: "CHANGE_ME"
    database: "membership"
    username: "b1stack"
    password: "CHANGE_ME"
  initdbScripts:
    01-init-databases.sql: |
      CREATE DATABASE IF NOT EXISTS membership CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS attendance CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS content    CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS giving     CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS messaging  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS doing      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS reporting  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS lessons    CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS askapi     CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      GRANT ALL PRIVILEGES ON *.* TO 'b1stack'@'%';
      FLUSH PRIVILEGES;

# Global settings shared across sub-charts
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ChurchApps API
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8084
    socketPort: 8087
  ingress:
    enabled: false
    hostname: api.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    ENVIRONMENT: production
    CORS_ORIGIN: "*"
    FILE_STORE: disk
    DELIVERY_PROVIDER: local
  secrets:
    # Connection strings and secrets are injected via Kubernetes Secrets.
    # In production, use the ExternalSecrets operator instead of hardcoding values here.
    ENCRYPTION_KEY: "CHANGE_ME"
    JWT_SECRET: "CHANGE_ME"
    MEMBERSHIP_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/membership"
    ATTENDANCE_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/attendance"
    CONTENT_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/content"
    GIVING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/giving"
    MESSAGING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/messaging"
    DOING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/doing"
    REPORTING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/reporting"

# B1Admin (church staff dashboard)
b1admin:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/b1admin
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3101
  ingress:
    enabled: false
    hostname: admin.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    REACT_APP_STAGE: production

# B1App (public church website / member portal)
b1app:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/b1app
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3301
  ingress:
    enabled: false
    hostname: example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NEXT_STAGE: production

# LessonsApi (optional)
lessonsapi:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/lessonsapi
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
  ingress:
    enabled: false
    hostname: lessons-api.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/lessons"
    ENCRYPTION_KEY: "CHANGE_ME"
    JWT_SECRET: "CHANGE_ME"

# AskApi (optional)
askapi:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/askapi
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8097
  ingress:
    enabled: false
    hostname: ask-api.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/askapi"
    ENCRYPTION_KEY: "CHANGE_ME"
    JWT_SECRET: "CHANGE_ME"
