# B1Stack Helm umbrella chart values

# Bitnami MySQL sub-chart (bundled database)
# Set mysql.enabled: false to use an external MySQL / managed DB (Cloud SQL, RDS, etc.)
# and supply connection strings via api.secrets.*_CONNECTION_STRING at deploy time.
mysql:
  enabled: true
  auth:
    rootPassword: "CHANGE_ME"
    database: "membership"
    username: "b1stack"
    password: "CHANGE_ME"
  initdbScripts:
    01-init-databases.sql: |
      CREATE DATABASE IF NOT EXISTS membership CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS attendance CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS content    CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS giving     CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS messaging  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS doing      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS reporting  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS lessons    CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS askapi     CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      GRANT ALL PRIVILEGES ON *.* TO 'b1stack'@'%';
      FLUSH PRIVILEGES;

# Global settings shared across all sub-charts (including Bitnami MySQL).
# imageRegistry: Override to pull all images from a custom registry (e.g. a pull-through cache).
#   Leave empty to use Docker Hub (default for Bitnami charts).
#   Note: registry.bitnami.com is Bitnami's commercial/authenticated registry — not suitable here.
#   To avoid Docker Hub rate limits in production, configure a pull-through cache at the cluster level
#   (k3s containerd mirrors, ECR pull-through cache, or GCP Artifact Registry remote repos).
global:
  imageRegistry: ""
  imagePullSecrets: []
  # storageClass: "" uses the cluster default (gp2 on EKS, standard on GKE, hcloud-volumes on Hetzner).
  # Override per-environment in values.<env>.yaml.
  storageClass: ""

# ChurchApps API
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8084
    socketPort: 8087
  ingress:
    enabled: false
    # className: ingress controller class — "nginx" (default), "gce" (GKE), "alb" (EKS + AWS Load Balancer Controller)
    className: ""
    hostname: api.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # HPA — requires metrics-server running in the cluster.
  # Verify: kubectl get deployment -n kube-system metrics-server
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
    # behavior: optional — tune scale-up/scale-down stabilization windows.
    # Example for Sunday-morning traffic patterns (fast up, slow down):
    # behavior:
    #   scaleUp:
    #     stabilizationWindowSeconds: 60
    #     policies:
    #       - type: Percent
    #         value: 100
    #         periodSeconds: 60
    #   scaleDown:
    #     stabilizationWindowSeconds: 600
    #     policies:
    #       - type: Pods
    #         value: 1
    #         periodSeconds: 120
  env:
    # Core
    ENVIRONMENT: production        # dev | staging | prod — selects config/<env>.json defaults
    CORS_ORIGIN: "*"               # Restrict to your domains in production, e.g. "https://example.com"

    # File storage — "disk" stores files on pod local disk (ephemeral!); "S3" uses AWS S3 / GCS via S3-compat API
    FILE_STORE: disk               # disk | S3
    DELIVERY_PROVIDER: local       # local | aws
    # CONTENT_ROOT: ""             # Public base URL for uploaded files (required when FILE_STORE=S3)

    # Email — leave MAIL_SYSTEM empty to disable outbound email
    # MAIL_SYSTEM: ""              # SES (AWS Simple Email Service) or empty
    # EMAIL_ON_REGISTRATION: "false"
    # SUPPORT_EMAIL: "support@yourchurch.com"

    # URLs (needed when API is deployed behind an ingress)
    # SERVER_PORT: "8084"
    # SOCKET_URL: ""               # ws(s)://host — internal WebSocket URL used by messaging module
    # SOCKET_PORT: "8087"
    # B1ADMIN_ROOT: "https://admin.example.com"   # Used in email links back to admin

    # AI provider — optional, powers Ask feature
    # AI_PROVIDER: "openrouter"    # openrouter | openai

    # Store / partner integrations — all optional
    # STORE_API_URL: ""
  secrets:
    # ── Required ─────────────────────────────────────────────────────────────
    # Connection strings and secrets are injected via Kubernetes Secrets.
    # In production, use the ExternalSecrets operator instead of hardcoding values here.
    ENCRYPTION_KEY: "CHANGE_ME"
    JWT_SECRET: "CHANGE_ME"

    # Database — one connection string per module.
    # When mysql.enabled=false, point these at your external DB (Cloud SQL, RDS, etc.)
    MEMBERSHIP_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/membership"
    ATTENDANCE_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/attendance"
    CONTENT_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/content"
    GIVING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/giving"
    MESSAGING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/messaging"
    DOING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/doing"
    REPORTING_CONNECTION_STRING: "mysql://b1stack:CHANGE_ME@b1stack-mysql:3306/reporting"

    # ── Optional secrets (uncomment and set as needed) ────────────────────────
    # File storage (required when FILE_STORE=S3)
    # AWS_S3_BUCKET: ""
    # AWS_ACCESS_KEY_ID: ""
    # AWS_SECRET_ACCESS_KEY: ""
    # AWS_REGION: "us-east-1"

    # AI integrations
    # OPENROUTER_API_KEY: ""
    # OPENAI_API_KEY: ""

    # Media / content integrations
    # YOUTUBE_API_KEY: ""
    # PEXELS_KEY: ""
    # VIMEO_TOKEN: ""
    # API_BIBLE_KEY: ""
    # YOUVERSION_API_KEY: ""
    # PRAISECHARTS_CONSUMER_KEY: ""
    # PRAISECHARTS_CONSUMER_SECRET: ""

    # Donation / reCAPTCHA
    # GOOGLE_RECAPTCHA_SECRET_KEY: ""

    # CRM / marketing
    # HUBSPOT_KEY: ""

    # Cross-module database (Doing module reads Membership DB)
    # DOING_MEMBERSHIP_CONNECTION_STRING: "mysql://..."
  # Scheduling knobs — override in environment-specific values files to target node pools.
  podAnnotations: {}
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # HPA — requires metrics-server running in the cluster.
  # Verify: kubectl get deployment -n kube-system metrics-server
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
    # behavior: optional — tune scale-up/scale-down stabilization windows.
    # Example for Sunday-morning traffic patterns (fast up, slow down):
    # behavior:
    #   scaleUp:
    #     stabilizationWindowSeconds: 60
    #   scaleDown:
    #     stabilizationWindowSeconds: 600

# B1Admin (church staff dashboard — React SPA served by nginx)
# NOTE: REACT_APP_* env vars are baked into the JS bundle at build time by Vite.
# The image already contains the API URLs for the environment it was built for.
# Runtime env (this section) has no effect on those URLs.
b1admin:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dnplkndll/b1stack/b1admin
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80  # nginx in production image; dev image uses 3101
  ingress:
    enabled: false
    className: ""
    hostname: admin.example.com
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # HPA — requires metrics-server. nginx CPU/mem metrics are less meaningful
  # than for dynamic services; consider connection-based metrics for production.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
    # behavior: {}
  env:
    REACT_APP_STAGE: production
  podAnnotations: {}
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80

# B1App (public church website / member portal — Next.js SSR)
b1app:
