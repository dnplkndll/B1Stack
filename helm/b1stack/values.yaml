  # HPA — requires metrics-server.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
    # behavior: {}
  env:
    NEXT_STAGE: production
  podAnnotations: {}
  imagePullSecrets: []
