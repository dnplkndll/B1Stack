name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  schedule:
    # Weekly build every Monday 06:00 UTC — rebuilds images pinned to current submodule SHAs in main.
    # To pull in new upstream commits, merge the PR from update-submodules.yml first.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Prevent concurrent builds on the same ref; cancel any in-progress run.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/dnplkndll/b1stack

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute tags
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          echo "date_tag=${DATE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "Tags: ${DATE}, ${SHA}, latest"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.date_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-b1admin:
    name: Build B1Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute tags
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          echo "date_tag=${DATE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push B1Admin
        # NOTE: B1Admin REACT_APP_* vars are baked into the JS bundle at build time (Vite define).
        # These images are therefore environment-specific (b1-test URLs).
        # For a different environment, rebuild with different REACT_APP_* build-args.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/b1admin/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/b1admin:latest
            ${{ env.IMAGE_PREFIX }}/b1admin:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_PREFIX }}/b1admin:${{ steps.meta.outputs.date_tag }}
          cache-from: type=gha,scope=b1admin
          cache-to: type=gha,mode=max,scope=b1admin
          build-args: |
            REACT_APP_STAGE=staging
            REACT_APP_MEMBERSHIP_API=https://api.b1-test.hz.ledoweb.com/membership
            REACT_APP_ATTENDANCE_API=https://api.b1-test.hz.ledoweb.com/attendance
            REACT_APP_GIVING_API=https://api.b1-test.hz.ledoweb.com/giving
            REACT_APP_REPORTING_API=https://api.b1-test.hz.ledoweb.com/reporting
            REACT_APP_MESSAGING_API=https://api.b1-test.hz.ledoweb.com/messaging
            REACT_APP_MESSAGING_API_SOCKET=wss://api.b1-test.hz.ledoweb.com
            REACT_APP_CONTENT_API=https://api.b1-test.hz.ledoweb.com/content
            REACT_APP_DOING_API=https://api.b1-test.hz.ledoweb.com/doing
            REACT_APP_LESSONS_API=https://api.b1-test.hz.ledoweb.com/lessons
            REACT_APP_CONTENT_ROOT=https://b1-test.hz.ledoweb.com
            REACT_APP_B1_ROOT=https://b1-test.hz.ledoweb.com
            REACT_APP_B1ADMIN_ROOT=https://admin.b1-test.hz.ledoweb.com

  build-b1app:
    name: Build B1App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute tags
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          echo "date_tag=${DATE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push B1App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/b1app/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/b1app:latest
            ${{ env.IMAGE_PREFIX }}/b1app:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_PREFIX }}/b1app:${{ steps.meta.outputs.date_tag }}
          cache-from: type=gha,scope=b1app
          cache-to: type=gha,mode=max,scope=b1app
          build-args: |
            NEXT_STAGE=staging

  release:
    name: Create GitHub Release
    needs: [build-api, build-b1admin, build-b1app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute release tag
        id: tag
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          echo "date_tag=${DATE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT

          # Collect submodule SHAs for release notes
          API_SHA=$(git -C services/Api rev-parse --short HEAD 2>/dev/null || echo "n/a")
          B1ADMIN_SHA=$(git -C services/B1Admin rev-parse --short HEAD 2>/dev/null || echo "n/a")
          B1APP_SHA=$(git -C services/B1App rev-parse --short HEAD 2>/dev/null || echo "n/a")
          echo "api_sha=${API_SHA}" >> $GITHUB_OUTPUT
          echo "b1admin_sha=${B1ADMIN_SHA}" >> $GITHUB_OUTPUT
          echo "b1app_sha=${B1APP_SHA}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.date_tag }}
          name: ${{ steps.tag.outputs.date_tag }}
          make_latest: true
          body: |
            ## Docker images

            ```
            ghcr.io/dnplkndll/b1stack/api:${{ steps.tag.outputs.date_tag }}
            ghcr.io/dnplkndll/b1stack/b1admin:${{ steps.tag.outputs.date_tag }}
            ghcr.io/dnplkndll/b1stack/b1app:${{ steps.tag.outputs.date_tag }}
            ```

            Also tagged `:${{ steps.tag.outputs.sha_tag }}` and `:latest`.

            > **Note:** B1Admin images have b1-test API URLs baked in at build time.
            > To deploy to a different environment, rebuild with the appropriate `REACT_APP_*` build-args.

            ## Upstream submodule commits

            | Service | Commit |
            |---------|--------|
            | [ChurchApps/Api](https://github.com/ChurchApps/Api) | `${{ steps.tag.outputs.api_sha }}` |
            | [ChurchApps/B1Admin](https://github.com/ChurchApps/B1Admin) | `${{ steps.tag.outputs.b1admin_sha }}` |
            | [ChurchApps/B1App](https://github.com/ChurchApps/B1App) | `${{ steps.tag.outputs.b1app_sha }}` |

            ## Helm deploy

            ```bash
            helm upgrade --install b1stack helm/b1stack \
              --kube-context hetzner-ledo --namespace b1-test \
              -f helm/b1stack/values.yaml -f helm/b1stack/values.b1-test.yaml \
              --set api.image.tag=${{ steps.tag.outputs.date_tag }} \
              --set b1admin.image.tag=${{ steps.tag.outputs.date_tag }} \
              --set b1app.image.tag=${{ steps.tag.outputs.date_tag }} \
              ...
            ```
